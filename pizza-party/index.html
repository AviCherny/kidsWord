<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizza Party</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <div class="bg-blob blob-a"></div>
    <div class="bg-blob blob-b"></div>
    <div class="bg-blob blob-c"></div>

    <header class="top-bar">
      <div class="brand-copy">
        <div class="brand-badge">Chef School</div>
        <h1>Pizza Party</h1>
        <p>Roll, squeeze, top, cut, and share a happy pizza.</p>
      </div>

      <div class="top-actions">
        <div id="progressStrip" class="progress-strip" aria-label="Game progress"></div>
        <div class="header-buttons">
          <button id="soundButton" class="ui-button secondary" type="button" aria-pressed="false">Sound On</button>
          <button id="resetButton" class="ui-button" type="button">Start Again</button>
        </div>
      </div>
    </header>

    <main class="game-layout">
      <aside class="side-panel left-panel">
        <div class="panel-card">
          <div class="panel-heading">
            <div>
              <div class="panel-kicker">Chef Tray</div>
              <h2 id="leftTitle">Ready to Cook</h2>
            </div>
          </div>
          <div id="leftContent" class="panel-content"></div>
        </div>
      </aside>

      <section class="board-panel">
        <div class="panel-card board-card" id="boardCard">
          <div class="stage-banner">
            <div class="guide-character">
              <div class="chef-hat"></div>
              <div class="guide-face">
                <span class="eye"></span>
                <span class="eye"></span>
                <span class="smile"></span>
              </div>
            </div>

            <div class="stage-copy">
              <div class="panel-kicker" id="stageKicker">Step 1</div>
              <h2 id="stageTitle">Roll the dough</h2>
              <p id="stageInstruction">Drag on the dough with the rolling pin until it becomes a smooth round pizza base.</p>
            </div>
          </div>

          <div class="board-stack" id="boardStack">
            <canvas id="pizzaCanvas" aria-label="Pizza board"></canvas>
            <div id="sliceLayer" class="slice-layer" aria-hidden="true"></div>
            <div id="effectLayer" class="effect-layer" aria-hidden="true"></div>
            <div id="celebrationLayer" class="celebration-layer" aria-hidden="true"></div>

            <div id="sauceSpread" class="sauce-spread" aria-hidden="true"></div>

            <div id="rollingPin" class="rolling-pin" aria-hidden="true">
              <span class="pin-handle"></span>
              <span class="pin-body"></span>
              <span class="pin-handle"></span>
            </div>

            <div id="knifeTrail" class="knife-trail hidden" aria-hidden="true">
              <span class="knife-line"></span>
              <span class="knife-tip"></span>
            </div>

            <div id="floatingMessage" class="floating-message" aria-live="assertive"></div>
          </div>
        </div>
      </section>

      <aside class="side-panel right-panel">
        <div class="panel-card">
          <div class="panel-heading">
            <div>
              <div class="panel-kicker">Fun Friends</div>
              <h2 id="rightTitle">Kitchen Helper</h2>
            </div>
          </div>
          <div id="rightContent" class="panel-content"></div>
        </div>
      </aside>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
