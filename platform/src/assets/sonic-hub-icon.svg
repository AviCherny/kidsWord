<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">Sonic icon</title>
  <desc id="desc">A simple Sonic-style character on a Green Hill background.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#72b5ff" />
      <stop offset="100%" stop-color="#4b93ea" />
    </linearGradient>
    <linearGradient id="hill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60ba5f" />
      <stop offset="100%" stop-color="#459f48" />
