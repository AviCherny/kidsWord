// =============================================
// CHROMA KEY — flood-fill from edges to remove background
// =============================================
function chromaKey(img, name, bgHex) {
  const oc  = document.createElement('canvas');
  oc.width  = img.naturalWidth;
  oc.height = img.naturalHeight;
  const tc  = oc.getContext('2d', { willReadFrequently: true });
  tc.drawImage(img, 0, 0);

  const W = oc.width, H = oc.height;
  const id = tc.getImageData(0, 0, W, H);
  const d  = id.data;

  const br = parseInt(bgHex.slice(1, 3), 16);
  const bg = parseInt(bgHex.slice(3, 5), 16);
  const bb = parseInt(bgHex.slice(5, 7), 16);

  const THRESH = 48; // max per-step color change during BFS
  const visited = new Uint8Array(W * H);
  const removed = new Uint8Array(W * H);

  function dist(pi, r, g, b) {
    const dr = d[pi] - r, dg = d[pi+1] - g, db = d[pi+2] - b;
    return Math.sqrt(dr*dr + dg*dg + db*db);
  }

  // Queue stores (x, y) as alternating elements for fast BFS
  const qx = new Int32Array(W * H);
  const qy = new Int32Array(W * H);
  let head = 0, tail = 0;

  const seed = (x, y) => {
    const i = y * W + x;
    if (visited[i]) return;
    visited[i] = 1;
    const pi = i * 4;
    if (dist(pi, br, bg, bb) < THRESH * 2.2) {
      removed[i] = 1;
      qx[tail] = x; qy[tail] = y; tail++;
    }
  };

  // Seed all four edges
  for (let x = 0; x < W; x++) { seed(x, 0); seed(x, H - 1); }
  for (let y = 1; y < H - 1; y++) { seed(0, y); seed(W - 1, y); }

  const DX = [-1, 1, 0, 0];
  const DY = [ 0, 0,-1, 1];

  while (head < tail) {
    const cx = qx[head], cy = qy[head]; head++;
    const cpi = (cy * W + cx) * 4;
    const cr = d[cpi], cg = d[cpi+1], cb = d[cpi+2];

    for (let k = 0; k < 4; k++) {
      const nx = cx + DX[k], ny = cy + DY[k];
      if (nx < 0 || nx >= W || ny < 0 || ny >= H) continue;
      const ni = ny * W + nx;
      if (visited[ni]) continue;
      visited[ni] = 1;
      const npi = ni * 4;
      const dr = d[npi] - cr, dg = d[npi+1] - cg, db = d[npi+2] - cb;
      if (Math.sqrt(dr*dr + dg*dg + db*db) < THRESH) {
        removed[ni] = 1;
        qx[tail] = nx; qy[tail] = ny; tail++;
      }
    }
  }

  // Apply: make removed pixels transparent
  for (let i = 0; i < W * H; i++) {
    if (removed[i]) d[i * 4 + 3] = 0;
  }

  tc.putImageData(id, 0, 0);
  processedImages[name] = oc;
}

function loadAssets(cb) {
  let n = 0;
  DOGS.forEach(dogData => {
    const img = new Image();
    img.onload = () => {
      chromaKey(img, dogData.name, dogData.bgColor);
      dogImages[dogData.name] = img;
      if (++n === DOGS.length) cb();
    };
    img.onerror = () => { if (++n === DOGS.length) cb(); };
    img.src = dogData.file;
  });
}

// =============================================
// SPEECH
// =============================================
function speak(text, rate = 0.85) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = rate; u.pitch = 1.2;
  const voices = speechSynthesis.getVoices();
  const female = voices.find(v => v.lang.startsWith('en') && /samantha|zira|karen|moira|victoria|female/i.test(v.name));
  if (female) u.voice = female;
  speechSynthesis.speak(u);
}

// =============================================
// UTILITIES
// =============================================
function shuffle(a) {
  const arr = [...a];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// =============================================
// SCROLLING BACKGROUND
// =============================================
let clouds = [];
let bgTime = 0;

function initBg() {
  clouds = Array.from({ length: 7 }, () => ({
    x: Math.random() * canvas.width,
    y: 30 + Math.random() * 140,
    rx: 50 + Math.random() * 60,
    ry: 25 + Math.random() * 20,
    speed: 0.25 + Math.random() * 0.45,
    alpha: 0.55 + Math.random() * 0.35,
  }));
}

function drawBg() {
  bgTime++;
  const gY = canvas.height * GROUND_RATIO;

  // Sky
  const sky = ctx.createLinearGradient(0, 0, 0, gY);
  sky.addColorStop(0, '#5CB8FF');
  sky.addColorStop(1, '#D6F0FF');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, canvas.width, gY);

  // Clouds
  clouds.forEach(c => {
    c.x -= c.speed;
    if (c.x < -c.rx * 2.5) c.x = canvas.width + c.rx;
    ctx.save();
    ctx.globalAlpha = c.alpha;
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.ellipse(c.x,               c.y,     c.rx,       c.ry,       0, 0, Math.PI * 2);
    ctx.ellipse(c.x - c.rx * 0.45, c.y + 6, c.rx * 0.65, c.ry * 0.7, 0, 0, Math.PI * 2);
    ctx.ellipse(c.x + c.rx * 0.45, c.y + 6, c.rx * 0.65, c.ry * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  // Ground gradient
  const grd = ctx.createLinearGradient(0, gY, 0, canvas.height);
  grd.addColorStop(0,    '#5DA83B');
  grd.addColorStop(0.12, '#4A8B2A');
  grd.addColorStop(0.12, '#7B5020');
  grd.addColorStop(1,    '#5A3810');
  ctx.fillStyle = grd;
  ctx.fillRect(0, gY, canvas.width, canvas.height - gY);

  // Scrolling grass tufts
  const tW = 55;
  const off = (bgTime * 1.8) % tW;
  ctx.fillStyle = '#6DC242';
  for (let x = -off; x < canvas.width + tW; x += tW) {
    ctx.beginPath();
    ctx.ellipse(x, gY, 18, 7, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Road stripe
  const stripeOff = (bgTime * 1.8) % 60;
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  for (let x = -stripeOff; x < canvas.width + 60; x += 60) {
    ctx.fillRect(x, gY + 4, 36, 6);
  }
}

// =============================================
// PARTICLES
// =============================================
let particles = [];

function burst(x, y, color, count = 14, type = 'dot') {
  for (let i = 0; i < count; i++) {
    const a  = (Math.PI * 2 * i / count) + Math.random() * 0.6;
    const sp = 3 + Math.random() * 7;
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 2,
      life: 1, decay: 0.018 + Math.random() * 0.015,
      size: 5 + Math.random() * 8, color, type });
  }
}
function starBurst(x, y) {
  ['⭐','🌟','✨','🎉'].forEach((em, i) => {
    const a  = (Math.PI * 2 * i / 4) - Math.PI / 2;
    const sp = 5 + Math.random() * 5;
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 4,
      life: 1, decay: 0.013, size: 22, color: em, type: 'emoji' });
  });
}

function tickParticles() {
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.life -= p.decay;
    return p.life > 0;
  });
}
function drawParticles() {
  particles.forEach(p => {
    ctx.save(); ctx.globalAlpha = p.life;
    if (p.type === 'emoji') {
      ctx.font = `${p.size}px serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(p.color, p.x, p.y);
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  });
}

// =============================================
// PAW PRINTS
// =============================================
let pawPrints = [];
let pawTimer  = 0;

function addPaw(x, y) { pawPrints.push({ x, y, alpha: 0.6 }); }
function tickPaws() {
  pawPrints = pawPrints.filter(p => { p.alpha -= 0.005; return p.alpha > 0; });
}
function drawPaws() {
  ctx.save(); ctx.font = '14px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  pawPrints.forEach(p => { ctx.globalAlpha = p.alpha; ctx.fillText('🐾', p.x, p.y); });
  ctx.restore();
}

// =============================================
// DOG
// =============================================
class Dog {
  constructor(data) {
    this.data = data;
    this.img  = dogImages[data.name];
    this.resetGround();
    this.vx = 0; this.vy = 0;
    this.onGround   = true;
    this.facing     = 1;
    this.runT       = 0;
    this.leftHeld   = false;
    this.rightHeld  = false;
    this.state      = 'idle'; // idle run jump celebrate ouch
    this.stateT     = 0;
    this.landSquash = 0;
    this.w = clamp(canvas.width * 0.15, 70, 110);
    this.h = this.w * 1.28;
  }
  resetGround() {
    this.gY = canvas.height * GROUND_RATIO;
    if (this.onGround || this.y === undefined) this.y = this.gY;
    if (this.x === undefined) this.x = canvas.width / 2;
  }
  jump() {
    if (this.onGround && this.state !== 'celebrate' && this.state !== 'ouch') {
      this.vy = JUMP_VY; this.onGround = false; this.state = 'jump';
    }
  }
  celebrate() {
    this.state = 'celebrate'; this.stateT = 100;
    starBurst(this.x, this.y - this.h * 0.9);
    burst(this.x, this.y - this.h * 0.5, '#FFD700', 18, 'dot');
  }
  ouch() {
    this.state = 'ouch'; this.stateT = 45;
    this.vx = -this.facing * 7; this.vy = -7;
    this.onGround = false;
    burst(this.x, this.y - this.h * 0.5, '#FF4444', 10, 'dot');
  }
  update() {
    if (this.stateT > 0) {
      this.stateT--;
      if (this.stateT === 0 && (this.state === 'celebrate' || this.state === 'ouch')) {
        this.state = this.onGround ? 'idle' : 'jump';
      }
    }

    const locked = this.state === 'celebrate' || this.state === 'ouch';
    if (!locked) {
      if (this.leftHeld)       { this.vx = -MOVE_SPEED; this.facing = -1; }
      else if (this.rightHeld) { this.vx =  MOVE_SPEED; this.facing =  1; }
      else { this.vx *= 0.68; if (Math.abs(this.vx) < 0.4) this.vx = 0; }
    } else {
      this.vx *= 0.8;
    }

    if (!this.onGround) this.vy += GRAVITY;
    this.x += this.vx;
    this.y += this.vy;

    if (this.y >= this.gY) {
      const wasAir = !this.onGround;
      this.y = this.gY; this.vy = 0; this.onGround = true;
      if (wasAir && this.state === 'jump') {
        this.landSquash = 0;
        this.state = Math.abs(this.vx) > 0.5 ? 'run' : 'idle';
      }
    }

    const hw = this.w * 0.5;
    this.x = clamp(this.x, hw, canvas.width - hw);

    if (this.onGround && !locked) {
      this.state = Math.abs(this.vx) > 0.5 ? 'run' : 'idle';
    }
    if (this.state === 'run') {
      this.runT++;
      pawTimer++;
      if (pawTimer % 20 === 0) addPaw(this.x - this.facing * this.w * 0.2, this.gY + 9);
    }

    if (this.landSquash > 0) this.landSquash--;
  }

  draw() {
    // Dynamic shadow
    const airH   = Math.max(0, this.gY - this.y);
    const shScale = lerp(1, 0.35, airH / 220);
    ctx.save();
    ctx.translate(this.x, this.gY + 12);
    ctx.scale(shScale, 0.28);
    ctx.beginPath();
    ctx.ellipse(0, 0, this.w * 0.52, this.w * 0.52, 0, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,0,0,${0.22 * shScale})`;
    ctx.fill();
    ctx.restore();

    // Body transform
    const t = this.runT;
    let tilt = 0, sx = 1, sy = 1, bY = 0;

    switch (this.state) {
      case 'run':
        bY   = 0;
        tilt = Math.sin(t * 0.22) * 0.07 + 0.10;
        break;
      case 'jump':
        tilt = 0.12 * this.facing;
        if (this.vy < 0) { sx = 0.84; sy = 1.16; }
        else             { sx = 1.12; sy = 0.90; }
        break;
      case 'celebrate':
        bY   = Math.sin(bgTime * 0.3) * 10;
        tilt = Math.sin(bgTime * 0.25) * 0.25;
        sx   = 1 + Math.abs(Math.sin(bgTime * 0.3)) * 0.12;
        sy   = sx;
        break;
      case 'ouch':
        tilt = -0.5 * this.facing;
        sx = 1.2; sy = 0.8;
        break;
    }
    if (this.landSquash > 0) {
      const q = this.landSquash / 9;
      sx = 1 + q * 0.28; sy = 1 - q * 0.22; bY = q * 4;
    }

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.scale(this.facing, 1);
    ctx.rotate(tilt);
    ctx.scale(sx, sy);
    ctx.translate(0, bY);

    const w = this.w, h = this.h;
    const procImg = processedImages[this.data.name];

    if (procImg) {
      // Chroma-keyed: draw full sprite — background is transparent
      ctx.drawImage(procImg, -w * 0.5, -h, w, h);
    } else if (this.img && this.img.complete && this.img.naturalWidth) {
      // Fallback: ellipse clip on raw JPEG
      ctx.save();
      ctx.beginPath();
      ctx.ellipse(0, -h * 0.50, w * 0.46, h * 0.48, 0, 0, Math.PI * 2);
      ctx.clip();
      ctx.drawImage(this.img, -w * 0.5, -h, w, h);
      ctx.restore();
      this.drawLegs(w, h);
    } else {
      // Placeholder
      ctx.fillStyle = this.data.color;
      ctx.beginPath(); ctx.ellipse(0, -h * 0.5, w * 0.45, h * 0.46, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'white'; ctx.font = `bold ${w * 0.25}px Arial`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(this.data.name[0], 0, -h * 0.5);
      this.drawLegs(w, h);
    }

    // Speed lines
    if (Math.abs(this.vx) > 3.5 && this.onGround) {
      ctx.save(); ctx.globalAlpha = 0.35; ctx.strokeStyle = 'white'; ctx.lineWidth = 2.5;
      for (let i = 0; i < 3; i++) {
        const ly = -h * (0.45 + i * 0.13);
        const lx = w * 0.35;
        ctx.beginPath();
        ctx.moveTo(lx, ly); ctx.lineTo(lx + w * (0.35 + i * 0.1), ly);
        ctx.stroke();
      }
      ctx.restore();
    }

    ctx.restore();
  }

  drawLegs(w, h) {
    const lc    = this.data.legColor;
    const phase = this.runT * 0.38;
    const running = this.state === 'run';
    const jumping = !this.onGround;
    const legW  = w * 0.115;
    const legH  = w * 0.22;

    const legDefs = [
      { x: -w * 0.20, phaseOff: 0 },
      { x: -w * 0.06, phaseOff: Math.PI },
      { x:  w * 0.06, phaseOff: Math.PI },
      { x:  w * 0.20, phaseOff: 0 },
    ];

    legDefs.forEach(({ x, phaseOff }) => {
      let angle = 0;
      if (running) angle = Math.sin(phase + phaseOff) * 0.45;
      if (jumping) angle = (this.vy < 0 ? -0.5 : 0.2);

      ctx.save();
      ctx.translate(x, -legH * 0.1);
      ctx.rotate(angle);
      ctx.fillStyle = lc;
      ctx.beginPath();
      ctx.roundRect(-legW / 2, 0, legW, legH, legW * 0.5);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(0, legH + 3, legW * 0.72, legW * 0.48, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  getBounds() {
    return {
      left:   this.x - this.w * 0.38,
      right:  this.x + this.w * 0.38,
      top:    this.y - this.h * 0.95,
      bottom: this.y + 8,
    };
  }
}

// =============================================
// FALLING WORD ITEM
// =============================================
const BADGE_COLORS = ['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#DDA0DD','#F4A261'];

class WordItem {
  constructor(wordObj, isTarget, x, startY) {
    this.w       = wordObj;
    this.target  = isTarget;
    this.x       = x;
    this.y       = startY;
    this.vy      = 1.4 + Math.random() * 0.8;
    this.vx      = (Math.random() - 0.5) * 0.6;
    this.bobT    = Math.random() * Math.PI * 2;
    this.bw      = 96; this.bh = 54;
    this.alive   = true;
    this.catchT  = 0;
    this.rot     = 0;
    this.sparkT  = 0;
    this.color   = isTarget ? '#FFD700' : BADGE_COLORS[Math.floor(Math.random() * BADGE_COLORS.length)];
    this.fallSpeed = 1;
  }
  update() {
    if (this.catchT > 0) {
      this.catchT--; this.rot += 0.18; this.y -= 4;
      if (this.catchT === 0) this.alive = false;
      return;
    }
    this.y += this.vy * this.fallSpeed;
    this.x += this.vx + Math.sin(this.bobT) * 0.6;
    this.bobT += 0.028;
    if (this.target) this.sparkT += 0.12;
    if (this.x < this.bw / 2 + 5 || this.x > canvas.width - this.bw / 2 - 5) this.vx *= -1;
    if (this.y > canvas.height + 70) this.alive = false;
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);

    const w = this.bw, h = this.bh;

    if (this.target) {
      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur = 16 + Math.sin(this.sparkT) * 8;
    }

    ctx.beginPath();
    ctx.roundRect(-w/2, -h/2, w, h, 13);
    ctx.fillStyle = this.color;
    ctx.fill();
    ctx.strokeStyle = this.target ? '#E65100' : 'rgba(255,255,255,0.65)';
    ctx.lineWidth   = this.target ? 3.5 : 2;
    ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.font = '14px serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(this.w.emoji, -w/2 + 5, -h/2 + 11);

    ctx.fillStyle   = this.target ? '#1A1A1A' : '#FFFFFF';
    ctx.font        = `bold ${Math.floor(w * 0.25)}px 'Arial Black', Arial`;
    ctx.textAlign   = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 3;
    ctx.fillText(this.w.word, 0, 4);
    ctx.shadowBlur = 0;

    ctx.restore();

    if (this.target) {
      for (let i = 0; i < 3; i++) {
        const a = this.sparkT + i * (Math.PI * 2 / 3);
        ctx.save();
        ctx.translate(this.x + Math.cos(a) * this.bw * 0.58, this.y + Math.sin(a) * this.bh * 0.65);
        ctx.fillStyle = '#FFD700'; ctx.globalAlpha = 0.8;
        ctx.beginPath(); ctx.arc(0, 0, 3.5, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
    }
  }
  bounds() {
    return { left: this.x - this.bw/2, right: this.x + this.bw/2,
             top:  this.y - this.bh/2, bottom: this.y + this.bh/2 };
  }
}

function hits(db, ib) {
  return db.right > ib.left && db.left < ib.right &&
         db.bottom > ib.top && db.top < ib.bottom;
}

// =============================================
// GROUND OBSTACLES
// =============================================
const OBSTACLE_TYPES = [
  { type:'car',   emoji:'🚗', label:'car',   eSize:64, hitH:48 },
  { type:'tree',  emoji:'🌳', label:'tree',  eSize:76, hitH:68 },
  { type:'house', emoji:'🏠', label:'house', eSize:70, hitH:60 },
  { type:'fire',  emoji:'🔥', label:'fire',  eSize:58, hitH:50 },
  { type:'rock',  emoji:'🪨', label:'rock',  eSize:52, hitH:38 },
];

class Obstacle {
  constructor(typeData) {
    this.type      = typeData.type;
    this.emoji     = typeData.emoji;
    this.label     = typeData.label;
    this.eSize     = typeData.eSize;
    this.hitH      = typeData.hitH;
    this.x         = canvas.width + 80;
    this.speed     = 3.0 + Math.random() * 1.2;
    this.alive     = true;
    this.announced = false;
  }
  update() {
    this.x -= this.speed;
    // Announce when ~30% of screen away
    if (!this.announced && this.x < canvas.width * 0.70) {
      this.announced = true;
      speak('Jump over the ' + this.label + '!');
    }
    if (this.x < -this.eSize - 60) this.alive = false;
  }
  draw() {
    const gY = canvas.height * GROUND_RATIO;
    ctx.save();
    ctx.font = `${this.eSize}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(this.emoji, this.x, gY + 4);
    ctx.restore();
  }
  getBounds() {
    const gY = canvas.height * GROUND_RATIO;
    return {
      left:   this.x - this.eSize * 0.30,
      right:  this.x + this.eSize * 0.30,
      top:    gY - this.hitH,
      bottom: gY,
    };
  }
}

// =============================================
// GAME STATE
// =============================================
const S = { MENU:'menu', PLAY:'play', OVER:'over', WIN:'win' };
let state = S.MENU;

let dog         = null;
let selectedDog = null;
let score       = 0;
let lives       = 3;
let wordsFound  = 0;
let difficulty  = 'normal'; // 'easy' | 'normal' | 'hard'
let diffBtns    = [];
let winBtn      = {};
let combo       = 0;
let round       = 0;

let wordPool    = shuffle(WORDS);
let wordIdx     = 0;
let curWord     = null;
let items       = [];
let roundPhase  = 'idle'; // idle announce active won missed
let roundTimer  = 0;
let fallSpeed   = 1;

let obstacles     = [];
let obstacleTimer = 0;

// =============================================
// ROUND LOGIC
// =============================================
function nextWord() {
  if (wordIdx >= wordPool.length) { wordPool = shuffle(WORDS); wordIdx = 0; }
  return wordPool[wordIdx++];
}

function startRound() {
  round++;
  fallSpeed = 1 + Math.floor(round / 5) * 0.15;
  curWord = nextWord();
  const distCount   = difficulty === 'hard' ? 5 : difficulty === 'normal' ? 3 : 2;
  const distractors = shuffle(WORDS.filter(w => w.word !== curWord.word)).slice(0, distCount);
  const all = shuffle([curWord, ...distractors]);

  items = [];
  const cols    = 4;
  const spacing = canvas.width / (cols + 1);
  all.forEach((w, i) => {
    const it = new WordItem(w, w === curWord, spacing * (i + 1), -70 - i * 90);
    it.fallSpeed = fallSpeed;
    items.push(it);
  });

  roundPhase = 'announce';
  roundTimer = 55;
  speak('Take the ' + curWord.label + '!');
}

function updateRound() {
  if (roundTimer > 0) {
    roundTimer--;
    if (roundTimer === 0) {
      if      (roundPhase === 'announce') roundPhase = 'active';
      else if (roundPhase === 'won')      startRound();
      else if (roundPhase === 'missed')   { lives > 0 ? startRound() : endGame(); }
    }
  }

  items.forEach(it => it.update());

  if (roundPhase === 'active') {
    const db = dog.getBounds();
    for (const it of items) {
      if (!it.alive || it.catchT > 0) continue;
      if (hits(db, it.bounds())) {
        if (it.target) {
          it.catchT = 22;
          dog.celebrate();
          score += 10 * Math.max(1, combo);
          combo++;
          roundPhase = 'won';
          roundTimer = 90;
          wordsFound++;
          if (wordsFound >= 8) {
            dog.celebrate();
            setTimeout(() => { speak('Hooray! You win! You get a sticker!'); }, 400);
            setTimeout(() => { state = S.WIN; }, 2000);
          } else {
            speak('Great job!');
          }
        } else {
          if (dog.state !== 'ouch') {
            it.catchT = 10;
            dog.ouch();
            lives--;
            combo = 0;
            speak('Try again!');
            if (lives <= 0) { endGame(); return; }
          }
        }
        break;
      }
    }

    const tgt = items.find(i => i.target);
    if (!tgt || (!tgt.alive && tgt.catchT === 0)) {
      lives--;
      combo = 0;
      speak('Missed!');
      if (lives <= 0) { endGame(); return; }
      roundPhase = 'missed';
      roundTimer = 55;
    }
  }

  items = items.filter(i => i.alive || i.catchT > 0);
}

// =============================================
// OBSTACLE LOGIC
// =============================================
function getObstacleInterval() {
  return Math.max(190, 310 - round * 6); // starts at 310 frames, min 190
}

function updateObstacles() {
  obstacleTimer++;
  if (obstacleTimer >= getObstacleInterval()) {
    obstacleTimer = 0;
    const typeData = OBSTACLE_TYPES[Math.floor(Math.random() * OBSTACLE_TYPES.length)];
    obstacles.push(new Obstacle(typeData));
  }

  obstacles.forEach(obs => obs.update());

  // Obstacle collision (only when dog is not already in ouch)
  if (dog && dog.state !== 'ouch') {
    const db = dog.getBounds();
    for (const obs of obstacles) {
      if (!obs.alive) continue;
      if (hits(db, obs.getBounds())) {
        dog.ouch();
        lives--;
        combo = 0;
        if (lives <= 0) { endGame(); return; }
        break;
      }
    }
  }

  obstacles = obstacles.filter(o => o.alive);
}

function endGame() {
  roundPhase = 'idle';
  state = S.OVER;
}

// =============================================
// HUD
// =============================================
function drawHUD() {
  const px = 18, py = 14;

  ctx.fillStyle = 'rgba(0,0,0,0.42)';
  ctx.beginPath(); ctx.roundRect(px, py, 124, 42, 12); ctx.fill();
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 21px "Arial Black", Arial';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(`⭐ ${score}`, px + 12, py + 21);

  if (combo >= 2) {
    ctx.save();
    const sz = Math.min(28, 18 + combo * 1.5);
    ctx.font = `bold ${sz}px "Arial Black", Arial`;
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#FF6B35';
    ctx.fillText(`🔥 ×${combo}`, px + 130, py + 21);
    ctx.restore();
  }

  ctx.fillStyle = 'rgba(0,0,0,0.42)';
  ctx.beginPath(); ctx.roundRect(canvas.width - px - 124, py, 124, 42, 12); ctx.fill();
  const hearts = '❤️'.repeat(clamp(lives, 0, 3)) + '🖤'.repeat(clamp(3 - lives, 0, 3));
  ctx.font = '20px serif'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillText(hearts, canvas.width - px - 10, py + 21);

  if (curWord) {
    const pw  = Math.min(290, canvas.width * 0.68);
    const ph  = 68;
    const px2 = canvas.width / 2 - pw / 2;
    const py2 = py;

    ctx.fillStyle = 'rgba(10,25,80,0.78)';
    ctx.beginPath(); ctx.roundRect(px2, py2, pw, ph, 16); ctx.fill();
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2.5; ctx.stroke();

    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '13px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText('CATCH:', canvas.width / 2, py2 + 9);

    ctx.fillStyle = '#FFD700';
    ctx.font = `bold 28px "Arial Black", Arial`;
    ctx.textBaseline = 'middle';
    ctx.fillText(`${curWord.emoji}  ${curWord.word}`, canvas.width / 2, py2 + ph * 0.67);
  }

  if ('ontouchstart' in window) {
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = '13px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText('← Swipe → to run   Tap to jump', canvas.width / 2, canvas.height - 10);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = '13px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText('← → Arrow keys to run   Space / ↑ to jump', canvas.width / 2, canvas.height - 10);
  }
}

// =============================================
// ON-SCREEN BUTTONS (touch)
// =============================================
let btnLeft = {}, btnRight = {}, btnJump = {};

function drawTouchButtons() {
  if (!('ontouchstart' in window)) return;
  const bh = 70, bw = 80, by = canvas.height - bh - 20, br = 16;

  const draw = (b, label, x) => {
    b.x = x; b.y = by; b.w = bw; b.h = bh;
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.beginPath(); ctx.roundRect(x, by, bw, bh, br); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = 'white'; ctx.font = 'bold 28px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(label, x + bw / 2, by + bh / 2);
  };

  draw(btnLeft,  '◀',  22);
  draw(btnRight, '▶',  22 + bw + 14);
  draw(btnJump,  '🦘', canvas.width - bw - 22);
}

function inBtn(b, x, y) {
  return b.x && x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h;
}

// =============================================
// MENU
// =============================================
let hoverDog  = -1;
let menuCards = [];

function drawMenu() {
  const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
  sky.addColorStop(0, '#0D47A1'); sky.addColorStop(1, '#1976D2');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.globalAlpha = 0.07; ctx.font = '32px serif'; ctx.textAlign = 'center';
  for (let row = 0; row < 5; row++)
    for (let col = 0; col < 6; col++)
      ctx.fillText('🐾', col * 80 + 40, row * 80 + 40);
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  const titleY = canvas.height * 0.10;
  const ts = Math.min(54, canvas.width * 0.11);
  ctx.font = `bold ${ts}px "Arial Black", Arial`;
  ctx.strokeStyle = '#C62828'; ctx.lineWidth = 7;
  ctx.strokeText('PAW PATROL', canvas.width / 2, titleY);
  ctx.fillStyle = '#FFD700';
  ctx.fillText('PAW PATROL', canvas.width / 2, titleY);

  ctx.font = `bold ${Math.min(34, canvas.width * 0.07)}px "Arial Black", Arial`;
  ctx.fillStyle = 'white';
  ctx.fillText('WORD RUN!', canvas.width / 2, canvas.height * 0.19);

  ctx.font = `${Math.min(20, canvas.width * 0.05)}px Arial`;
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.fillText('Pick your pup!', canvas.width / 2, canvas.height * 0.28);

  const cW = clamp(canvas.width * 0.26, 95, 145);
  const cH = cW * 1.52;
  const gap = 18;
  const totalW = cW * 3 + gap * 2;
  const startX = canvas.width / 2 - totalW / 2;
  const cardY  = canvas.height * 0.33;

  menuCards = [];

  DOGS.forEach((d, i) => {
    const cx   = startX + i * (cW + gap);
    const hov  = hoverDog === i;
    const sc   = hov ? 1.07 : 1;
    const midX = cx + cW / 2, midY = cardY + cH / 2;

    ctx.save();
    ctx.translate(midX, midY);
    ctx.scale(sc, sc);
    ctx.translate(-cW/2, -cH/2);

    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.roundRect(4, 6, cW, cH, 18); ctx.fill();

    ctx.fillStyle = d.color;
    ctx.beginPath(); ctx.roundRect(0, 0, cW, cH, 18); ctx.fill();
    if (hov) { ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 4; ctx.stroke(); }

    const proc = processedImages[d.name];
    const rawImg = dogImages[d.name];
    if (proc) {
      // Draw chroma-keyed sprite into card top area
      ctx.save();
      ctx.beginPath(); ctx.roundRect(5, 5, cW - 10, cH * 0.74, 14); ctx.clip();
      ctx.drawImage(proc, 5, 5, cW - 10, cH * 0.74);
      ctx.restore();
    } else if (rawImg && rawImg.complete && rawImg.naturalWidth) {
      ctx.save();
      ctx.beginPath(); ctx.roundRect(5, 5, cW - 10, cH * 0.74, 14); ctx.clip();
      ctx.drawImage(rawImg, 5, 5, cW - 10, cH * 0.74);
      ctx.restore();
    }

    ctx.fillStyle = 'white';
    ctx.font = `bold ${Math.floor(cW * 0.155)}px "Arial Black", Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.strokeStyle = 'rgba(0,0,0,0.45)'; ctx.lineWidth = 3;
    ctx.strokeText(d.name.toUpperCase(), cW/2, cH * 0.88);
    ctx.fillText(d.name.toUpperCase(), cW/2, cH * 0.88);

    ctx.restore();
    menuCards[i] = { x: midX - cW/2 * sc, y: midY - cH/2 * sc, w: cW * sc, h: cH * sc };
  });

  // Difficulty buttons
  diffBtns = [];
  const diffLabels = [
    { id:'easy',   label:'EASY',   hearts:'❤️❤️❤️❤️❤️' },
    { id:'normal', label:'NORMAL', hearts:'❤️❤️❤️' },
    { id:'hard',   label:'HARD',   hearts:'❤️' },
  ];
  const dbW = clamp(canvas.width * 0.26, 90, 130);
  const dbH = 52;
  const dbGap = 12;
  const dbTotalW = dbW * 3 + dbGap * 2;
  const dbX0 = canvas.width / 2 - dbTotalW / 2;
  const dbY  = canvas.height * 0.78;
  ctx.font = `bold ${Math.min(13, canvas.width * 0.034)}px "Arial Black", Arial`;
  diffLabels.forEach((dl, i) => {
    const bx = dbX0 + i * (dbW + dbGap);
    const sel = difficulty === dl.id;
    ctx.fillStyle = sel ? '#FFD700' : 'rgba(255,255,255,0.13)';
    ctx.beginPath(); ctx.roundRect(bx, dbY, dbW, dbH, 12); ctx.fill();
    if (sel) {
      ctx.strokeStyle = '#FF8F00'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.roundRect(bx, dbY, dbW, dbH, 12); ctx.stroke();
    }
    ctx.fillStyle = sel ? '#1A1A1A' : 'rgba(255,255,255,0.7)';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(dl.label, bx + dbW / 2, dbY + dbH * 0.36);
    ctx.font = `${Math.min(15, canvas.width * 0.04)}px serif`;
    ctx.fillText(dl.hearts, bx + dbW / 2, dbY + dbH * 0.72);
    ctx.font = `bold ${Math.min(13, canvas.width * 0.034)}px "Arial Black", Arial`;
    diffBtns[i] = { x: bx, y: dbY, w: dbW, h: dbH, id: dl.id };
  });

  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = `${Math.min(15, canvas.width * 0.038)}px Arial`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText('Tap a pup to start!', canvas.width / 2, canvas.height - 18);
}

// =============================================
// WIN SCREEN
// =============================================
function drawWin() {
  ctx.fillStyle = 'rgba(0,0,0,0.70)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const bw = clamp(canvas.width * 0.82, 270, 370);
  const bh = 340;
  const bx = canvas.width/2 - bw/2, by = canvas.height/2 - bh/2;

  const grad = ctx.createLinearGradient(bx, by, bx + bw, by + bh);
  grad.addColorStop(0, '#0D47A1'); grad.addColorStop(1, '#7B1FA2');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 24); ctx.fill();
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 4; ctx.stroke();

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  ctx.font = `${clamp(canvas.width * 0.16, 52, 72)}px serif`;
  ctx.fillText('🏅', canvas.width/2, by + bh * 0.16);

  ctx.font = `bold ${clamp(canvas.width * 0.1, 34, 44)}px "Arial Black", Arial`;
  ctx.strokeStyle = '#C62828'; ctx.lineWidth = 6;
  ctx.strokeText('YOU WIN!', canvas.width/2, by + bh * 0.33);
  ctx.fillStyle = '#FFD700';
  ctx.fillText('YOU WIN!', canvas.width/2, by + bh * 0.33);

  // Hebrew sticker text
  ctx.fillStyle = 'white';
  ctx.font = `bold ${clamp(canvas.width * 0.075, 24, 30)}px Arial`;
  ctx.fillText('🌟 \u05d0\u05ea\u05d4 \u05de\u05e7\u05d1\u05dc \u05de\u05d3\u05d1\u05e7\u05d4! 🌟', canvas.width/2, by + bh * 0.50);

  ctx.fillStyle = '#FFD700';
  ctx.font = `bold 28px "Arial Black", Arial`;
  ctx.fillText(`Score: ${score}`, canvas.width/2, by + bh * 0.64);

  const btnW = 210, btnH = 52;
  const btnX = canvas.width/2 - btnW/2, btnY = by + bh * 0.80 - btnH/2;
  ctx.fillStyle = '#43A047';
  ctx.beginPath(); ctx.roundRect(btnX, btnY, btnW, btnH, 14); ctx.fill();
  ctx.strokeStyle = '#1B5E20'; ctx.lineWidth = 3; ctx.stroke();
  ctx.fillStyle = 'white';
  ctx.font = `bold 22px "Arial Black", Arial`;
  ctx.fillText('PLAY AGAIN 🐾', canvas.width/2, btnY + btnH/2);
  winBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
}

// =============================================
// GAME OVER
// =============================================
let goBtn = {};

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.62)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const bw = clamp(canvas.width * 0.78, 260, 360);
  const bh = 290;
  const bx = canvas.width/2 - bw/2, by = canvas.height/2 - bh/2;

  ctx.fillStyle = '#1A237E';
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 24); ctx.fill();
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 4; ctx.stroke();

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  ctx.fillStyle = '#FF6B6B';
  ctx.font = `bold ${clamp(canvas.width * 0.1, 32, 44)}px "Arial Black", Arial`;
  ctx.fillText('GAME OVER', canvas.width/2, by + bh * 0.22);

  ctx.fillStyle = '#FFD700';
  ctx.font = `bold 30px "Arial Black", Arial`;
  ctx.fillText(`Score: ${score}`, canvas.width/2, by + bh * 0.42);

  const stars = score >= 150 ? 3 : score >= 70 ? 2 : score >= 20 ? 1 : 0;
  ctx.font = '38px serif';
  ctx.fillText('⭐'.repeat(stars) + '☆'.repeat(3 - stars), canvas.width/2, by + bh * 0.60);

  const btnW = 200, btnH = 52;
  const btnX = canvas.width/2 - btnW/2, btnY = by + bh * 0.77 - btnH/2;
  ctx.fillStyle = '#43A047';
  ctx.beginPath(); ctx.roundRect(btnX, btnY, btnW, btnH, 14); ctx.fill();
  ctx.fillStyle = 'white';
  ctx.font = 'bold 21px "Arial Black", Arial';
  ctx.fillText('PLAY AGAIN! 🐾', canvas.width/2, btnY + btnH/2);
  goBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
}

// =============================================
// INPUT
// =============================================
document.addEventListener('keydown', e => {
  if (state === S.PLAY && dog) {
    if (e.key === 'ArrowLeft')  { e.preventDefault(); dog.leftHeld  = true; }
    if (e.key === 'ArrowRight') { e.preventDefault(); dog.rightHeld = true; }
    if (e.key === ' ' || e.key === 'ArrowUp') { e.preventDefault(); dog.jump(); }
  }
});
document.addEventListener('keyup', e => {
  if (dog) {
    if (e.key === 'ArrowLeft')  dog.leftHeld  = false;
    if (e.key === 'ArrowRight') dog.rightHeld = false;
  }
});

let touchAnchorX = 0;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  touchAnchorX = t.clientX;

  if (state === S.PLAY && dog) {
    if (inBtn(btnJump,  t.clientX, t.clientY)) { dog.jump(); return; }
    if (inBtn(btnLeft,  t.clientX, t.clientY)) { dog.leftHeld  = true; return; }
    if (inBtn(btnRight, t.clientX, t.clientY)) { dog.rightHeld = true; return; }
    dog.jump();
  }
  if (state === S.MENU) handleMenuTap(t.clientX, t.clientY);
  if (state === S.OVER) handleOverTap(t.clientX, t.clientY);
  if (state === S.WIN)  handleWinTap(t.clientX, t.clientY);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (state !== S.PLAY || !dog) return;
  const t  = e.changedTouches[0];
  const dx = t.clientX - touchAnchorX;
  if (dx > 25)       { dog.rightHeld = true;  dog.leftHeld  = false; }
  else if (dx < -25) { dog.leftHeld  = true;  dog.rightHeld = false; }
  else               { dog.leftHeld  = false; dog.rightHeld = false; }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (dog) { dog.leftHeld = false; dog.rightHeld = false; }
}, { passive: false });

canvas.addEventListener('click', e => {
  if (state === S.MENU) handleMenuTap(e.clientX, e.clientY);
  if (state === S.OVER) handleOverTap(e.clientX, e.clientY);
});

canvas.addEventListener('mousemove', e => {
  if (state !== S.MENU) return;
  hoverDog = -1;
  menuCards.forEach((c, i) => {
    if (c && e.clientX >= c.x && e.clientX <= c.x + c.w &&
             e.clientY >= c.y && e.clientY <= c.y + c.h) hoverDog = i;
  });
});

function handleMenuTap(x, y) {
  diffBtns.forEach((b) => {
    if (b && x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) { difficulty = b.id; return; }
  });
  menuCards.forEach((c, i) => {
    if (c && x >= c.x && x <= c.x + c.w && y >= c.y && y <= c.y + c.h) startGame(DOGS[i]);
  });
}
function handleWinTap(x, y) {
  if (winBtn.x && x >= winBtn.x && x <= winBtn.x + winBtn.w &&
                  y >= winBtn.y && y <= winBtn.y + winBtn.h) {
    state = S.MENU; score = 0; combo = 0; round = 0;
    wordPool = shuffle(WORDS); wordIdx = 0; wordsFound = 0;
  }
}

function handleOverTap(x, y) {
  if (goBtn.x && x >= goBtn.x && x <= goBtn.x + goBtn.w &&
                 y >= goBtn.y && y <= goBtn.y + goBtn.h) {
    state = S.MENU; score = 0; lives = 3; combo = 0; round = 0;
    wordPool = shuffle(WORDS); wordIdx = 0;
  }
}

// =============================================
// START GAME
// =============================================
function startGame(dogData) {
  selectedDog   = dogData;
  dog           = new Dog(dogData);
  score         = 0; lives = difficulty === 'easy' ? 5 : difficulty === 'hard' ? 1 : 3; combo = 0; round = 0;
  wordsFound    = 0;
  particles     = []; pawPrints = []; items = [];
  obstacles     = []; obstacleTimer = 0;
  fallSpeed     = 1;
  wordPool      = shuffle(WORDS); wordIdx = 0;
  initBg();
  state = S.PLAY;
  speak(dogData.tagline, 0.9);
  setTimeout(() => startRound(), 1200);
}

// =============================================
// MAIN LOOP
// =============================================

function loop() {
  requestAnimationFrame(loop);
  bgTime++;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (state === S.MENU) {
    drawMenu();
    return;
  }

  drawBg();
  tickPaws(); drawPaws();
  tickParticles(); drawParticles();

  if (state === S.PLAY) {
    // Obstacles behind dog
    obstacles.forEach(obs => obs.draw());
    items.forEach(it => it.draw());
    dog.update();
    updateRound();
    updateObstacles();
    dog.draw();
    drawHUD();
    drawTouchButtons();
  }

  if (state === S.OVER) {
    if (dog) dog.draw();
    drawGameOver();
  }

  if (state === S.WIN) {
    if (dog) dog.draw();
    drawWin();
  }
}

// =============================================
// INIT
// =============================================
loadAssets(() => {
  initBg();
  loop();
});
</script>
</body>
</html>
