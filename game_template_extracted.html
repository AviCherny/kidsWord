<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Paw Patrol Word Run</title>

<script src="7756bdc3-ecdb-4aea-9ff7-916f3e12f38d" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="78fa5b02-154e-4eff-a520-25f866d0df89" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="cd1a3542-66a8-4996-bb29-4fc869707ae0" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; background:#111; }
#root { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }

@keyframes cloudScroll {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}
@keyframes itemFloat {
  0%,100% { transform: translateY(0px); }
  50%     { transform: translateY(-10px); }
}
@keyframes itemCollect {
  0%   { transform: scale(1) translateY(0); opacity:1; }
  50%  { transform: scale(1.4) translateY(-24px); opacity:0.7; }
  100% { transform: scale(0.4) translateY(-60px); opacity:0; }
}
@keyframes hurtFlash {
  0%,100% { filter: none; }
  25%,75% { filter: brightness(3) saturate(0) hue-rotate(0deg); }
}
@keyframes wordPulse {
  0%,100% { transform: scale(1); }
  50%     { transform: scale(1.05); }
}
@keyframes confettiDrop {
  0%   { transform: translateY(-20px) rotate(0deg); opacity:1; }
  100% { transform: translateY(70px) rotate(720deg); opacity:0; }
}
@keyframes slideDown {
  from { transform: translateY(-40px); opacity:0; }
  to   { transform: translateY(0); opacity:1; }
}
@keyframes startCardIn {
  from { transform: translateY(60px) scale(0.92); opacity:0; }
  to   { transform: translateY(0) scale(1); opacity:1; }
}
@keyframes titleBounce {
  0%,100% { transform: rotate(-2deg) scale(1); }
  50%     { transform: rotate(2deg) scale(1.05); }
}
@keyframes pawFloat {
  0%,100% { transform: translateY(0) rotate(-10deg); opacity:0.18; }
  50%     { transform: translateY(-12px) rotate(10deg); opacity:0.35; }
}
@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position: 200% center; }
}
@keyframes groundScroll {
  from { background-position-x: 0; }
  to   { background-position-x: -200px; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Constants ─────────────────────────────────────────────────
const DOG_SCREEN_X = 95;
const DOG_W        = 88;
const DOG_H        = 100;
const GRAVITY      = 1900;    // px/s²
const JUMP_VY      = -820;    // px/s
const MAX_FALL     = 1100;    // px/s cap
const WORLD_SPEED  = 215;     // px/s
const WARN_DIST    = 310;     // px ahead of dog, trigger obstacle warning
const ITEM_W       = 74;
const ITEM_H       = 82;
const PLAT_H       = 20;
const PLAT_W_MIN   = 90;
const PLAT_W_MAX   = 160;

// ── Word sets ─────────────────────────────────────────────────
const WORD_SETS = [
  { target:'APPLE',  items:[{e:'🍎',w:'apple',ok:true}, {e:'🍊',w:'orange',ok:false},{e:'🍇',w:'grapes',ok:false}] },
  { target:'BOX',    items:[{e:'📦',w:'box',ok:true},   {e:'🎈',w:'balloon',ok:false},{e:'🍕',w:'pizza',ok:false}]  },
  { target:'BALL',   items:[{e:'🏀',w:'ball',ok:true},  {e:'🚗',w:'car',ok:false},    {e:'⭐',w:'star',ok:false}]   },
  { target:'CAT',    items:[{e:'🐱',w:'cat',ok:true},   {e:'🐶',w:'dog',ok:false},    {e:'🐸',w:'frog',ok:false}]  },
  { target:'BONE',   items:[{e:'🦴',w:'bone',ok:true},  {e:'🎾',w:'ball',ok:false},   {e:'🍪',w:'cookie',ok:false}] },
  { target:'STAR',   items:[{e:'⭐',w:'star',ok:true},  {e:'🌙',w:'moon',ok:false},   {e:'☀️',w:'sun',ok:false}]   },
  { target:'FISH',   items:[{e:'🐟',w:'fish',ok:true},  {e:'🦀',w:'crab',ok:false},   {e:'🐙',w:'octopus',ok:false}]},
  { target:'HOUSE',  items:[{e:'🏠',w:'house',ok:true}, {e:'🏰',w:'castle',ok:false}, {e:'⛺',w:'tent',ok:false}]  },
];

// ── Obstacles ─────────────────────────────────────────────────
const OBSTACLE_TYPES = [
  { e:'🔥', name:'fire',   w:50, h:56 },
  { e:'🪨', name:'rock',   w:48, h:46 },
  { e:'🌊', name:'wave',   w:64, h:30 },
  { e:'🌵', name:'cactus', w:40, h:64 },
];

// ── Platform colors ───────────────────────────────────────────
const PLAT_COLORS = ['#E53935','#1976D2','#F9A825','#2E7D32','#7B1FA2','#E65100'];

// ── Item card gradients ───────────────────────────────────────
const ITEM_GRADS = [
  'linear-gradient(135deg,#FF5252,#C62828)',
  'linear-gradient(135deg,#448AFF,#1565C0)',
  'linear-gradient(135deg,#FFCA28,#E65100)',
];

// ── Characters ────────────────────────────────────────────────
const CHARACTERS = {
  chase:    { getImg: () => window.__resources?.chaseImg,    name:'Chase',    color:'#1565C0' },
  marshall: { getImg: () => window.__resources?.marshallImg, name:'Marshall', color:'#C62828' },
  rubble:   { getImg: () => window.__resources?.rubbleImg,   name:'Rubble',   color:'#F9A825' },
};

// ── Helpers ───────────────────────────────────────────────────

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function overlaps(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function mkDiv(css) {
  const d = document.createElement('div');
  d.style.cssText = css;
  return d;
}

// ── PawPrint SVG ──────────────────────────────────────────────
function PawPrint({ size = 28, color = '#fff', opacity = 1, style = {} }) {
  return (
    <svg width={size} height={size} viewBox="0 0 40 40" style={{ opacity, ...style }}>
      <ellipse cx="20" cy="28" rx="10" ry="8" fill={color}/>
      <ellipse cx="9"  cy="17" rx="5"  ry="6" fill={color}/>
      <ellipse cx="31" cy="17" rx="5"  ry="6" fill={color}/>
      <ellipse cx="14" cy="10" rx="4"  ry="5" fill={color}/>
      <ellipse cx="26" cy="10" rx="4"  ry="5" fill={color}/>
    </svg>
  );
}

// ── Confetti ──────────────────────────────────────────────────
function Confetti() {
  const pieces = Array.from({ length: 18 }, (_, i) => ({
    left:  `${5 + i * 5.3}%`,
    delay: `${i * 0.065}s`,
    color: ['#FFD700','#FF5252','#64FFDA','#FF80AB','#B388FF'][i % 5],
    dur:   `${0.7 + (i % 3) * 0.2}s`,
  }));
  return (
    <div style={{ position:'absolute', top:0, left:0, right:0, pointerEvents:'none', zIndex:99 }}>
      {pieces.map((p, i) => (
        <div key={i} style={{
          position:'absolute', top:0, left:p.left,
          width:10, height:10, background:p.color,
          borderRadius: i % 2 === 0 ? '50%' : 2,
          animation: `confettiDrop ${p.dur} ease-out ${p.delay} both`,
        }}/>
      ))}
    </div>
  );
}

// ── Start Screen ──────────────────────────────────────────────
function StartScreen({ onStart }) {
  const [selChar, setSelChar]   = useState('marshall');
  const [selLives, setSelLives] = useState(3);

  return (
    <div style={{
      position:'absolute', inset:0, zIndex:50,
      background:'linear-gradient(180deg,#0D47A1 0%,#1565C0 50%,#0a3d8f 100%)',
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
      padding:'20px 16px',
    }}>
      {[
        {top:'8%',left:'6%',s:38,d:'0s'}, {top:'14%',right:'8%',s:28,d:'0.6s'},
        {top:'72%',left:'4%',s:32,d:'1.1s'},{top:'80%',right:'6%',s:24,d:'0.3s'},
      ].map((p, i) => (
        <div key={i} style={{
          position:'absolute',top:p.top,left:p.left,right:p.right,
          animation:`pawFloat 3s ease-in-out ${p.d} infinite`,pointerEvents:'none',
        }}>
          <PawPrint size={p.s} color="white" opacity={0.2}/>
        </div>
      ))}

      <div style={{
        width:'100%', maxWidth:360,
        background:'linear-gradient(160deg,#1976D2 0%,#0D47A1 100%)',
        borderRadius:28, border:'4px solid #FFD700',
        boxShadow:'0 12px 0 rgba(0,0,0,0.45),0 20px 40px rgba(0,0,0,0.4)',
        overflow:'hidden',
        animation:'startCardIn 0.5s cubic-bezier(0.34,1.56,0.64,1)',
        paddingBottom:24,
      }}>
        <div style={{background:'linear-gradient(135deg,#E53935,#B71C1C)',padding:'20px 0 16px',textAlign:'center'}}>
          <div style={{fontSize:48,marginBottom:4,animation:'titleBounce 2s ease-in-out infinite'}}>🐾</div>
          <div style={{fontFamily:'Nunito,system-ui',fontWeight:900,fontSize:28,color:'#FFD700',letterSpacing:3,textShadow:'0 3px 0 rgba(0,0,0,0.4)'}}>
            PAW PATROL
          </div>
          <div style={{fontFamily:'Nunito,system-ui',fontWeight:700,fontSize:15,color:'rgba(255,255,255,0.85)',letterSpacing:2,marginTop:4}}>
            WORD RUN
          </div>
        </div>

        <div style={{padding:'20px 20px 0'}}>
          <div style={{marginBottom:18}}>
            <div style={{fontFamily:'Nunito,system-ui',fontWeight:900,fontSize:12,color:'rgba(255,255,255,0.7)',letterSpacing:2,marginBottom:10}}>
              CHOOSE YOUR PAW PATROL
            </div>
            <div style={{display:'flex',gap:10}}>
              {Object.entries(CHARACTERS).map(([key, ch]) => {
                const sel = selChar === key;
                return (
                  <div key={key} onClick={() => setSelChar(key)} style={{
                    flex:1, padding:'10px 0 8px', borderRadius:18,
                    background: sel ? ch.color : 'rgba(255,255,255,0.08)',
                    border:`3px solid ${sel ? '#FFD700' : 'rgba(255,255,255,0.15)'}`,
                    cursor:'pointer', textAlign:'center', transition:'all 0.2s',
                  }}>
                    <div style={{fontSize:30,marginBottom:2}}>
                      {key === 'chase' ? '🐕‍🦺' : key === 'marshall' ? '🚒' : '🔨'}
                    </div>
                    <div style={{fontFamily:'Nunito,system-ui',fontWeight:900,fontSize:11,
                      color: sel ? '#FFD700' : 'rgba(255,255,255,0.6)',letterSpacing:1}}>
                      {ch.name.toUpperCase()}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <div style={{marginBottom:20}}>
            <div style={{fontFamily:'Nunito,system-ui',fontWeight:900,fontSize:12,color:'rgba(255,255,255,0.7)',letterSpacing:2,marginBottom:10}}>
              DIFFICULTY
            </div>
            <div style={{display:'flex',gap:10}}>
              {[1,2,3].map(n => {
                const sel = selLives === n;
                return (
                  <div key={n} onClick={() => setSelLives(n)} style={{
                    flex:1, padding:'10px 6px', borderRadius:14,
                    background: sel ? 'rgba(255,214,0,0.18)' : 'rgba(255,255,255,0.07)',
                    border:`3px solid ${sel ? '#FFD700' : 'rgba(255,255,255,0.12)'}`,
                    cursor:'pointer', textAlign:'center', transition:'all 0.2s',
                  }}>
                    <div style={{display:'flex',justifyContent:'center',gap:2,marginBottom:4}}>
                      {Array.from({length:n}).map((_, i) => <span key={i} style={{fontSize:16}}>❤️</span>)}
                    </div>
                    <span style={{fontFamily:'Nunito,system-ui',fontWeight:900,fontSize:10,
                      color: sel ? '#FFD700' : 'rgba(255,255,255,0.5)',letterSpacing:1}}>
                      {n === 1 ? 'HARD' : n === 2 ? 'NORMAL' : 'EASY'}
                    </span>
                  </div>
                );
              })}
            </div>
          </div>

          <button onClick={() => onStart({ character: selChar, lives: selLives })} style={{
            width:'100%', background:'linear-gradient(135deg,#FFD700,#FF8F00)',
            border:'none', borderRadius:999, padding:'15px 0',
            fontFamily:'Nunito,system-ui', fontWeight:900, fontSize:24, color:'#1A1A1A', letterSpacing:3,
            cursor:'pointer', boxShadow:'0 7px 0 rgba(0,0,0,0.45)',
            display:'flex', alignItems:'center', justifyContent:'center', gap:10,
          }}>
            <span>🐾</span> START! <span>🐾</span>
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Main Game Component ───────────────────────────────────────
function PawPatrolWordRun() {
  const [screen,     setScreen]     = useState('start');
  const [cfg,        setCfg]        = useState(null);
  const [hud,        setHud]        = useState({ score:0, lives:3, target:'', confetti:false });
  const [finalScore, setFinalScore] = useState(0);
  const [gameKey,    setGameKey]    = useState(0);
  const containerRef = useRef(null);

  // ── Game loop (runs when screen==='game') ──────────────────
  useEffect(() => {
    if (screen !== 'game' || !cfg || !containerRef.current) return;
    const container = containerRef.current;

    const W = container.clientWidth  || 420;
    const H = container.clientHeight || 780;
    const GROUND_Y   = Math.round(H * 0.80);
    const DOG_INIT_Y = GROUND_Y - DOG_H;

    // ── Build background DOM ───────────────────────────────
    const skyEl = mkDiv(`position:absolute;inset:0;
      background:linear-gradient(180deg,#1565C0 0%,#42A5F5 55%,#81D4FA 100%);z-index:0;`);

    const cloudsEl = mkDiv(`position:absolute;top:0;left:0;width:200%;height:55%;z-index:1;
      animation:cloudScroll 28s linear infinite;`);
    [0,1].forEach(k => {
      const half = mkDiv(`position:absolute;top:0;left:${k*50}%;width:50%;height:100%;`);
      [{t:25,l:'6%',s:1.1},{t:55,l:'36%',s:0.85},{t:18,l:'60%',s:1.3},{t:70,l:'78%',s:0.7}].forEach((c,i) => {
        const cloud = mkDiv(`position:absolute;top:${c.t}px;left:${c.l};transform:scale(${c.s});transform-origin:left center;`);
        cloud.innerHTML = `<div style="position:relative;width:78px;height:34px">
          <div style="position:absolute;bottom:0;left:0;right:0;height:20px;background:rgba(255,255,255,0.9);border-radius:99px"></div>
          <div style="position:absolute;bottom:10px;left:10px;width:28px;height:28px;background:rgba(255,255,255,0.9);border-radius:50%"></div>
          <div style="position:absolute;bottom:14px;left:26px;width:36px;height:36px;background:rgba(255,255,255,0.9);border-radius:50%"></div>
          <div style="position:absolute;bottom:8px;left:48px;width:24px;height:24px;background:rgba(255,255,255,0.9);border-radius:50%"></div>
        </div>`;
        half.appendChild(cloud);
      });
      cloudsEl.appendChild(half);
    });

    const groundEl = mkDiv(`position:absolute;left:0;right:0;z-index:2;
      top:${GROUND_Y}px;height:${H - GROUND_Y}px;
      background:linear-gradient(180deg,#4CAF50 0%,#388E3C 13%,#8D6E63 13%,#6D4C41 100%);`);
    // Grass tufts strip
    const tuftsEl = mkDiv(`position:absolute;top:-9px;left:0;width:200%;height:18px;
      display:flex;align-items:flex-end;gap:0;animation:cloudScroll 5s linear infinite;`);
    for (let i = 0; i < 44; i++) {
      const t = mkDiv(`width:0;height:0;
        border-left:6px solid transparent;border-right:6px solid transparent;
        border-bottom:${10 + (i%3)*4}px solid #66BB6A;
        margin-right:${16 + (i%4)*3}px;flex-shrink:0;`);
      tuftsEl.appendChild(t);
    }
    groundEl.appendChild(tuftsEl);
    // Path stripes
    const pathEl = mkDiv(`position:absolute;top:${GROUND_Y + Math.round((H-GROUND_Y)*0.13)}px;
      left:0;width:200%;height:6px;
      background:repeating-linear-gradient(90deg,rgba(255,255,255,0.18) 0px,rgba(255,255,255,0.18) 36px,transparent 36px,transparent 60px);
      animation:cloudScroll 4s linear infinite;z-index:3;`);

    // Objects container
    const objEl = mkDiv(`position:absolute;inset:0;z-index:5;pointer-events:none;overflow:visible;`);

    // Dog
    const dogWrap = mkDiv(`position:absolute;left:${DOG_SCREEN_X}px;
      width:${DOG_W}px;height:${DOG_H}px;z-index:10;transform-origin:center bottom;`);
    const charData = CHARACTERS[cfg.character] || CHARACTERS.marshall;
    const imgSrc = charData.getImg();
    if (imgSrc) {
      const img = document.createElement('img');
      img.src = imgSrc;
      img.style.cssText = `width:100%;height:100%;object-fit:contain;object-position:bottom center;
        filter:drop-shadow(0 4px 8px rgba(0,0,0,0.35));pointer-events:none;user-select:none;`;
      img.onerror = () => { dogWrap.textContent = '🐕'; dogWrap.style.fontSize = '68px'; dogWrap.style.lineHeight = `${DOG_H}px`; dogWrap.style.textAlign = 'center'; };
      dogWrap.appendChild(img);
    } else {
      dogWrap.style.fontSize = '68px';
      dogWrap.style.lineHeight = `${DOG_H}px`;
      dogWrap.style.textAlign = 'center';
      dogWrap.textContent = '🐕';
    }

    // Dog shadow (child of dogWrap so it moves with it)
    const shadowEl = mkDiv(`position:absolute;bottom:-5px;left:50%;
      width:58px;height:10px;
      background:rgba(0,0,0,0.22);border-radius:50%;filter:blur(3px);
      transform:translateX(-50%);`);
    dogWrap.appendChild(shadowEl);

    [skyEl, cloudsEl, groundEl, pathEl, objEl, dogWrap].forEach(el => container.appendChild(el));

    // ── Game state ─────────────────────────────────────────
    let dog = { y: DOG_INIT_Y, vy: 0, onGround: true, runT: 0, hurtT: 0 };

    let gs = {
      score:   0,
      lives:   cfg.lives,
      wordIdx: 0,
      objects: [],
      nextId:  0,
      spawnT:  2.2,
      phase:   'playing',  // 'playing' | 'hurt' | 'celebrating'
      phaseT:  0,
      alive:   true,
    };

    const ws = () => WORD_SETS[gs.wordIdx % WORD_SETS.length];

    setHud({ score:0, lives:cfg.lives, target:ws().target, confetti:false });

    // ── Spawn helpers ──────────────────────────────────────
    function posObj(obj) {
      obj.el.style.transform = `translate(${Math.round(obj.x)}px,${Math.round(obj.y)}px)`;
    }

    function spawnPlatform(x, y, w) {
      const color = PLAT_COLORS[Math.floor(Math.random() * PLAT_COLORS.length)];
      const el = mkDiv(`position:absolute;left:0;top:0;width:${w}px;height:${PLAT_H}px;
        background:${color};border-radius:8px;
        box-shadow:0 4px 0 rgba(0,0,0,0.35),0 0 0 3px rgba(255,255,255,0.25);`);
      objEl.appendChild(el);
      const obj = { type:'platform', el, x, y, w, h:PLAT_H, id:gs.nextId++ };
      gs.objects.push(obj);
      posObj(obj);
      return obj;
    }

    function spawnItem(x, y, data, colorIdx) {
      // wrapper div (moved by JS); inner div (CSS float animation)
      const wrapper = mkDiv(`position:absolute;left:0;top:0;`);
      const floatDelay = `${(Math.random() * 1.5).toFixed(2)}s`;
      const inner = mkDiv(`width:${ITEM_W}px;height:${ITEM_H}px;
        background:${ITEM_GRADS[colorIdx % 3]};border-radius:18px;
        border:3px solid rgba(255,255,255,0.35);
        box-shadow:0 6px 0 rgba(0,0,0,0.35),inset 0 2px 0 rgba(255,255,255,0.2);
        display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
        animation:itemFloat 2.2s ease-in-out ${floatDelay} infinite;`);
      inner.innerHTML = `
        <div style="font-size:36px;line-height:1;">${data.e}</div>
        <div style="font-family:Nunito,system-ui;font-weight:900;font-size:11px;color:#fff;
          letter-spacing:2px;background:rgba(0,0,0,0.38);padding:2px 8px;border-radius:999px;">
          ${data.w.toUpperCase()}</div>`;
      wrapper.appendChild(inner);
      objEl.appendChild(wrapper);
      const obj = { type:'item', el:wrapper, inner, x, y, w:ITEM_W, h:ITEM_H, data, id:gs.nextId++, collected:false };
      gs.objects.push(obj);
      posObj(obj);
      return obj;
    }

    function spawnObstacle() {
      const t = OBSTACLE_TYPES[Math.floor(Math.random() * OBSTACLE_TYPES.length)];
      const y = GROUND_Y - t.h;
      const el = mkDiv(`position:absolute;left:0;top:0;
        width:${t.w}px;height:${t.h}px;
        font-size:${Math.round(t.h * 0.85)}px;line-height:${t.h}px;
        text-align:center;filter:drop-shadow(0 3px 6px rgba(0,0,0,0.4));`);
      el.textContent = t.e;
      objEl.appendChild(el);
      const obj = { type:'obstacle', el, x:W + 40, y, w:t.w, h:t.h, data:t, warned:false, id:gs.nextId++ };
      gs.objects.push(obj);
      posObj(obj);
    }

    function spawnGroup() {
      const items = shuffle(ws().items);
      let baseX = W + 50;
      items.forEach((item, i) => {
        const gap = 190 + Math.random() * 90;
        const x = baseX + i * gap;
        const onPlatform = Math.random() < 0.42;
        if (onPlatform) {
          const pw = PLAT_W_MIN + Math.random() * (PLAT_W_MAX - PLAT_W_MIN);
          const py = GROUND_Y - 110 - Math.random() * 55;
          spawnPlatform(x - 14, py, pw);
          // item sits on top of platform
          spawnItem(x + Math.round((pw - ITEM_W) / 2) - 14, py - ITEM_H, item, i);
        } else {
          spawnItem(x, GROUND_Y - ITEM_H, item, i);
        }
      });
    }

    function removeObj(obj) {
      const idx = gs.objects.indexOf(obj);
      if (idx >= 0) gs.objects.splice(idx, 1);
      if (obj.el.parentNode) obj.el.parentNode.removeChild(obj.el);
    }

    // ── Input ──────────────────────────────────────────────
    function onJump() {
      if (!gs.alive || gs.phase !== 'playing') return;
      if (dog.onGround) {
        dog.vy = JUMP_VY;
        dog.onGround = false;
      }
    }
    container.addEventListener('click',      onJump);
    container.addEventListener('touchstart', onJump, { passive:true });

    // ── RAF loop ───────────────────────────────────────────
    let lastT = null;
    let rafId = null;

    function tick(now) {
      if (!gs.alive) return;
      if (!lastT) lastT = now;
      const dt = Math.min((now - lastT) / 1000, 0.05);
      lastT = now;

      // Phase timer
      if (gs.phaseT > 0) {
        gs.phaseT -= dt;
        if (gs.phaseT <= 0) gs.phase = 'playing';
      }

      // Dog physics (gravity always applied; surfaces snap below)
      dog.vy = Math.min(MAX_FALL, dog.vy + GRAVITY * dt);
      dog.y += dog.vy * dt;
      dog.runT += dt * 9;
      dog.onGround = false;

      // Platform landing
      const dogLeft   = DOG_SCREEN_X + 8;
      const dogRight  = DOG_SCREEN_X + DOG_W - 8;
      const dogBottom = dog.y + DOG_H;
      for (const obj of gs.objects) {
        if (obj.type !== 'platform') continue;
        if (dogRight > obj.x && dogLeft < obj.x + obj.w) {
          if (dog.vy >= 0 && dogBottom >= obj.y - 2 && dogBottom <= obj.y + obj.h + 38) {
            dog.y = obj.y - DOG_H;
            dog.vy = 0;
            dog.onGround = true;
          }
        }
      }

      // Ground
      if (dog.y + DOG_H >= GROUND_Y) {
        dog.y = GROUND_Y - DOG_H;
        dog.vy = 0;
        dog.onGround = true;
      }

      // Move & check objects
      const toRemove = [];
      for (const obj of gs.objects) {
        obj.x -= WORLD_SPEED * dt;
        posObj(obj);

        if (obj.x < -240) { toRemove.push(obj); continue; }

        // Item collection
        if (obj.type === 'item' && !obj.collected && gs.phase === 'playing') {
          const px = DOG_SCREEN_X + 14, py = dog.y + 14;
          const pw = DOG_W - 28,        ph = DOG_H - 20;
          if (overlaps(px, py, pw, ph, obj.x + 6, obj.y + 6, obj.w - 12, obj.h - 12)) {
            obj.collected = true;
            // collect animation
            obj.inner.style.animation = 'itemCollect 0.38s ease-out forwards';
            setTimeout(() => removeObj(obj), 420);

            if (obj.data.ok) {
              gs.score += 10;
              gs.phase  = 'celebrating';
              gs.phaseT = 1.1;
              const nextIdx = gs.wordIdx + 1;
              const nextTarget = WORD_SETS[nextIdx % WORD_SETS.length].target.toLowerCase();
              setTimeout(() => {
                gs.wordIdx = nextIdx;
                setHud({ score:gs.score, lives:gs.lives, target:WORD_SETS[nextIdx % WORD_SETS.length].target, confetti:false });
              }, 950);
              setHud(h => ({ ...h, score:gs.score, confetti:true }));
              setTimeout(() => setHud(h => ({ ...h, confetti:false })), 1400);
            } else {
              gs.lives--;
              gs.phase  = 'hurt';
              gs.phaseT = 0.75;
              dogWrap.style.animation = 'hurtFlash 0.75s';
              setTimeout(() => { dogWrap.style.animation = ''; }, 750);
              setHud(h => ({ ...h, lives:gs.lives }));
              if (gs.lives <= 0) {
                gs.alive = false;
                setTimeout(() => { setFinalScore(gs.score); setScreen('end'); }, 900);
                return;
              }
            }
          }
        }

        // Obstacle warning + collision
        if (obj.type === 'obstacle') {
          if (!obj.warned && obj.x > DOG_SCREEN_X + DOG_W && obj.x - DOG_SCREEN_X < WARN_DIST) {
            obj.warned = true;
          }
          if (gs.phase === 'playing') {
            const px = DOG_SCREEN_X + 16, py = dog.y + 18;
            const pw = DOG_W - 32,        ph = DOG_H - 24;
            if (overlaps(px, py, pw, ph, obj.x + 5, obj.y + 5, obj.w - 10, obj.h - 10)) {
              // Only collide if dog bottom is close to ground (not jumping over)
              if (dog.y + DOG_H > obj.y + 10) {
                gs.lives--;
                gs.phase  = 'hurt';
                gs.phaseT = 0.75;
                dogWrap.style.animation = 'hurtFlash 0.75s';
                setTimeout(() => { dogWrap.style.animation = ''; }, 750);
                obj.el.style.opacity = '0.3';
                setHud(h => ({ ...h, lives:gs.lives }));
                if (gs.lives <= 0) {
                  gs.alive = false;
                  setTimeout(() => { setFinalScore(gs.score); setScreen('end'); }, 900);
                  return;
                }
              }
            }
          }
        }
      }

      for (const obj of toRemove) removeObj(obj);

      // Spawn timer
      gs.spawnT -= dt;
      if (gs.spawnT <= 0) {
        if (Math.random() < 0.62) {
          spawnGroup();
          gs.spawnT = 4.0 + Math.random() * 2.0;
        } else {
          spawnObstacle();
          gs.spawnT = 2.5 + Math.random() * 1.5;
        }
      }

      // Render dog
      const bounce = dog.onGround ? Math.sin(dog.runT) * 3.5 : 0;
      const tilt   = dog.onGround
        ? Math.sin(dog.runT * 0.65) * 0.055
        : (dog.vy < 0 ? 0.12 : -0.08);
      dogWrap.style.top       = `${Math.round(dog.y + bounce)}px`;
      dogWrap.style.transform = `rotate(${tilt}rad)`;

      // Shadow squash when airborne
      const airH = Math.max(0, GROUND_Y - (dog.y + DOG_H));
      const shadowSc = Math.max(0.25, 1 - airH / 200);
      shadowEl.style.transform = `translateX(-50%) scaleX(${shadowSc})`;
      shadowEl.style.opacity   = String(shadowSc * 0.8);

      rafId = requestAnimationFrame(tick);
    }

    rafId = requestAnimationFrame(tick);

    return () => {
      gs.alive = false;
      cancelAnimationFrame(rafId);
      container.removeEventListener('click',      onJump);
      container.removeEventListener('touchstart', onJump);
      while (container.firstChild) container.removeChild(container.firstChild);
    };
  }, [gameKey]); // eslint-disable-line react-hooks/exhaustive-deps

  function handleStart(config) {
    setCfg(config);
    setScreen('game');
    setGameKey(k => k + 1);
  }

  return (
    <div style={{
      width:'100%', height:'100%',
      display:'flex', alignItems:'center', justifyContent:'center',
      background:'#111',
      fontFamily:"'Nunito','Fredoka One',system-ui,sans-serif",
    }}>
      {/* Phone viewport */}
      <div style={{
        width:'min(420px,100vw)', height:'min(780px,100vh)',
        position:'relative', overflow:'hidden',
        borderRadius:'min(32px,4vw)',
        boxShadow:'0 24px 80px rgba(0,0,0,0.8),0 0 0 2px rgba(255,255,255,0.08)',
      }}>
        {/* Game world (DOM-managed) */}
        <div ref={containerRef} style={{
          position:'absolute', inset:0,
          cursor:'pointer', userSelect:'none', WebkitUserSelect:'none',
        }}/>

        {/* HUD overlay */}
        {screen === 'game' && (
          <>
            {hud.confetti && <Confetti/>}
            <div style={{
              position:'absolute', top:0, left:0, right:0, zIndex:30,
              padding:'14px 14px 0',
              display:'flex', flexDirection:'column', alignItems:'center', gap:10,
              animation:'slideDown 0.5s cubic-bezier(0.34,1.56,0.64,1)',
              pointerEvents:'none',
            }}>
              <div style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div style={{display:'flex',alignItems:'center',gap:4,
                  background:'rgba(0,0,0,0.35)',borderRadius:999,
                  padding:'6px 14px 6px 8px',border:'3px solid #FFD700',
                  boxShadow:'0 3px 0 rgba(0,0,0,0.4)'}}>
                  <PawPrint size={26} color="#FFD700"/>
                  <span style={{fontFamily:'Nunito,system-ui',fontWeight:900,fontSize:22,
                    color:'#FFD700',textShadow:'0 2px 0 rgba(0,0,0,0.5)',
                    minWidth:32,textAlign:'center'}}>
                    {hud.score}
                  </span>
                </div>
                <div style={{display:'flex',gap:4}}>
                  {Array.from({length: cfg?.lives || 3}).map((_,i) => (
                    <div key={i} style={{fontSize:26,
                      filter: i >= hud.lives
                        ? 'grayscale(1) opacity(0.35)'
                        : 'drop-shadow(0 2px 4px rgba(255,0,100,0.5))'}}>
                      ❤️
                    </div>
                  ))}
                </div>
              </div>

              {hud.target && (
                <div style={{
                  background:'linear-gradient(135deg,#E53935,#B71C1C)',
                  borderRadius:20, padding:'8px 28px',
                  border:'4px solid #FFD700',
                  boxShadow:'0 6px 0 rgba(0,0,0,0.45)',
                  display:'flex', alignItems:'center', gap:10,
                  animation:'wordPulse 2s ease-in-out infinite',
                }}>
                  <span style={{fontSize:16,color:'rgba(255,255,255,0.8)',fontWeight:700,letterSpacing:1}}>
                    FIND THE
                  </span>
                  <span style={{fontSize:32,fontWeight:900,color:'#FFD700',letterSpacing:4,
                    textShadow:'0 3px 0 rgba(0,0,0,0.5)'}}>
                    {hud.target}
                  </span>
                  <span style={{fontSize:20}}>👆</span>
                </div>
              )}
            </div>

            <div style={{
              position:'absolute', bottom:18, left:'50%',
              transform:'translateX(-50%)',
              color:'rgba(255,255,255,0.5)', fontSize:13, fontWeight:700, letterSpacing:2,
              zIndex:30, pointerEvents:'none',
            }}>
              TAP TO JUMP
            </div>
          </>
        )}

        {/* Start screen */}
        {screen === 'start' && <StartScreen onStart={handleStart}/>}

        {/* End screen */}
        {screen === 'end' && (
          <div style={{
            position:'absolute', inset:0, zIndex:50,
            background:'rgba(13,33,80,0.96)',
            display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
            gap:20, padding:30,
          }}>
            <div style={{fontSize:64}}>🏆</div>
            <div style={{fontFamily:'Nunito,system-ui',fontWeight:900,fontSize:28,
              color:'#FFD700',letterSpacing:2,textAlign:'center'}}>
              GREAT RUN!
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10,
              background:'rgba(0,0,0,0.4)',borderRadius:999,
              padding:'12px 28px',border:'3px solid #FFD700'}}>
              <PawPrint size={32} color="#FFD700"/>
              <span style={{fontFamily:'Nunito,system-ui',fontWeight:900,fontSize:36,color:'#FFD700'}}>
                {finalScore}
              </span>
            </div>
            <button onClick={() => setScreen('start')} style={{
              background:'linear-gradient(135deg,#FFD700,#FF8F00)',
              border:'none', borderRadius:999, padding:'14px 36px',
              fontFamily:'Nunito,system-ui', fontWeight:900, fontSize:20, color:'#1A1A1A', letterSpacing:2,
              cursor:'pointer', boxShadow:'0 6px 0 rgba(0,0,0,0.4)',
            }}>
              PLAY AGAIN 🐾
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PawPatrolWordRun/>);
</script>
